<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Calculator</title>
  <style>
    /* General Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: linear-gradient(135deg, #667eea, #764ba2);
      transition: background 0.3s ease;
      position: relative;
    }

    body.light {
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
    }

    /* Social Links */
    .social-links {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .social-links a {
      color: white;
      font-size: 1.5rem;
      text-decoration: none;
      transition: transform 0.2s, color 0.3s;
    }

    .social-links a:hover {
      transform: scale(1.2);
      color: #ffcc00;
    }

    body.light .social-links a {
      color: #333;
    }

    /* Calculator Box */
    .calculator {
      width: 320px;
      background: #222;
      border-radius: 15px;
      box-shadow: 0px 4px 20px rgba(0,0,0,0.5);
      overflow: hidden;
      transition: background 0.3s ease;
    }

    body.light .calculator {
      background: #fff;
      box-shadow: 0px 4px 20px rgba(0,0,0,0.3);
    }

    /* Display */
    #display {
      width: 100%;
      height: 70px;
      border: none;
      outline: none;
      font-size: 2rem;
      padding: 10px;
      text-align: right;
      background: #333;
      color: #fff;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body.light #display {
      background: #f1f1f1;
      color: #000;
    }

    /* Buttons Grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 10px;
    }

    .btn {
      height: 60px;
      font-size: 1.2rem;
      border: none;
      border-radius: 10px;
      background: #444;
      color: white;
      cursor: pointer;
      transition: transform 0.1s, background 0.3s;
    }

    body.light .btn {
      background: #ddd;
      color: #000;
    }

    .btn:hover {
      background: #555;
      transform: scale(1.05);
    }

    body.light .btn:hover {
      background: #ccc;
    }

    .operator {
      background: #ff9500;
    }

    .operator:hover {
      background: #e08900;
    }

    .equal {
      grid-column: span 2;
      background: #28a745;
    }

    .equal:hover {
      background: #218838;
    }

    /* Toggle Button */
    .toggle-mode {
      margin: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #06c;
      color: #fff;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.3s;
    }

    .toggle-mode:hover {
      background: #00509e;
    }

    body.light .toggle-mode {
      background: #444;
      color: #fff;
    }

    body.light .toggle-mode:hover {
      background: #000;
    }

    /* Footer */
    footer {
      margin-top: 20px;
      font-size: 1rem;
      color: white;
      text-align: center;
      opacity: 0.8;
    }

    body.light footer {
      color: #222;
    }
  </style>
</head>
<body>

  <!-- Calculator -->
  <div>
    <button class="toggle-mode" onclick="toggleMode()">🌙 Dark/Light</button>
    <div class="calculator">
      <input type="text" id="display" disabled>
      <div class="buttons">
        <button class="btn operator" onclick="clearDisplay()">C</button>
        <button class="btn operator" onclick="deleteLast()">⌫</button>
        <button class="btn operator" onclick="appendValue('%')">%</button>
        <button class="btn operator" onclick="appendValue('/')">÷</button>

        <button class="btn" onclick="appendValue('7')">7</button>
        <button class="btn" onclick="appendValue('8')">8</button>
        <button class="btn" onclick="appendValue('9')">9</button>
        <button class="btn operator" onclick="appendValue('*')">×</button>

        <button class="btn" onclick="appendValue('4')">4</button>
        <button class="btn" onclick="appendValue('5')">5</button>
        <button class="btn" onclick="appendValue('6')">6</button>
        <button class="btn operator" onclick="appendValue('-')">−</button>

        <button class="btn" onclick="appendValue('1')">1</button>
        <button class="btn" onclick="appendValue('2')">2</button>
        <button class="btn" onclick="appendValue('3')">3</button>
        <button class="btn operator" onclick="appendValue('+')">+</button>

        <button class="btn" onclick="appendValue('0')">0</button>
        <button class="btn" onclick="appendValue('.')">.</button>
        <button class="btn equal" onclick="calculateResult()">=</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    Calculator by <b>Darshan Wahurwagh</b>
  </footer>

  <script>
    let display = document.getElementById("display");

    function appendValue(value) {
      display.value += value;
    }

    function clearDisplay() {
      display.value = "";
    }

    function deleteLast() {
      display.value = display.value.slice(0, -1);
    }

    function calculateResult() {
      try {
        display.value = eval(display.value.replace("÷", "/").replace("×", "*"));
      } catch (error) {
        display.value = "Error";
      }
    }

    // Dark/Light mode toggle
    function toggleMode() {
      document.body.classList.toggle("light");
    }

    // Keyboard Support
    document.addEventListener("keydown", (event) => {
      const key = event.key;
      if (!isNaN(key) || ["+", "-", "*", "/", "%", "."].includes(key)) {
        appendValue(key);
      } else if (key === "Enter") {
        calculateResult();
      } else if (key === "Backspace") {
        deleteLast();
      } else if (key === "Escape") {
        clearDisplay();
      }
    });
  </script>
</body>
</html>
